services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: buildx-hackathon-web:latest
    container_name: buildx-web
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - buildx-net

  nginx:
    image: nginx:1.27-alpine
    container_name: buildx-nginx
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - buildx-net

networks:
  buildx-net:
    driver: bridge
