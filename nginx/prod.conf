user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  client_max_body_size 10m;
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 12s;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  upstream nextjs_upstream {
    server web:3000;
    keepalive 32;
  }

  # HTTP — ACME challenge + redirect to HTTPS
  server {
    listen 80;
    listen [::]:80;
    server_name hackathon.buildx.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Catch-all on 80 — drop unknown hosts
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
  }

  # HTTPS — production site
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hackathon.buildx.uz;

    ssl_certificate     /etc/letsencrypt/live/hackathon.buildx.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackathon.buildx.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hackathon.buildx.uz/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    limit_req zone=req_limit burst=40 nodelay;
    limit_conn conn_limit 30;

    location /_next/static/ {
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /_next/image {
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_buffering off;
    }
  }

  # Catch-all on 443 — drop unknown TLS SNI
  server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/hackathon.buildx.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackathon.buildx.uz/privkey.pem;

    return 444;
  }
}
