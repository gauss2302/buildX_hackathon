services:
  web:
    image: node:22-alpine
    container_name: buildx-web-dev
    working_dir: /app
    command: sh -c "npm ci --no-audit --no-fund && npm run dev -- --hostname 0.0.0.0"
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app:cached
      - dev_node_modules:/app/node_modules
      - dev_next_cache:/app/.next
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - buildx-dev-net

  nginx:
    image: nginx:1.27-alpine
    container_name: buildx-nginx-dev
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - buildx-dev-net

volumes:
  dev_node_modules:
  dev_next_cache:

networks:
  buildx-dev-net:
    driver: bridge
